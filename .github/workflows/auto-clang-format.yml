name: auto-clang-format

on:
  pull_request:
  release:
    types: [ published ]
  push:
    branches:
      - main
      - develop

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.head_ref || github.ref }} # For pull_request and other events

      - name: Run clang-format
        uses: DoozyX/clang-format-lint-action@v0.20
        with:
          source: '.'
          exclude: './third_party ./external'
          extensions: 'h,cpp,hpp'
          clangFormatVersion: 19
          inplace: True

      - name: Commit changes
        if: ${{ github.event_name != 'release' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
        uses: EndBug/add-and-commit@v9
        with:
          author_name: Clang Robot
          author_email: robot@example.com
          message: |
            :art: Applied clang-format to source code (auto-formatting)
            - Updated .h, .cpp, and .hpp files to conform with the style guide.
            - Changes include:
              - Indentation adjustments
              - Spacing improvements
              - Alignment enhancements
              - Consistency in formatting across files
              - Removal of trailing whitespace
          push: true
          default_author: github_actor
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
